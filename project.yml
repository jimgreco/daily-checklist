name: Daily
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "26.0"
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.1.0
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: V6JPQCD336
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Daily:
    type: application
    platform: iOS
    sources:
      - path: Daily
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jimgreco.dailychecklist
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Daily/Info.plist
        API_BASE_URL: http://127.0.0.1:8787
        GOOGLE_CLIENT_ID: YOUR_GOOGLE_IOS_CLIENT_ID.apps.googleusercontent.com
        GOOGLE_REVERSED_CLIENT_ID: com.googleusercontent.apps.YOUR_GOOGLE_IOS_CLIENT_ID
        CODE_SIGN_ENTITLEMENTS: Daily/Daily.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: "$(IOS_PROFILE_NAME)"
    scheme:
      testTargets:
        - DailyTests
  DailyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DailyTests
    dependencies:
      - target: Daily
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jimgreco.dailychecklist.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Daily.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Daily"
        BUNDLE_LOADER: "$(TEST_HOST)"
  DailyScreenshots:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DailyScreenshots
    dependencies:
      - target: Daily
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jimgreco.dailychecklist.screenshots
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Daily
    scheme:
      testTargets:
        - DailyScreenshots
